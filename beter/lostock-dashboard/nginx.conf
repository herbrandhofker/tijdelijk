server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(js|css)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}
